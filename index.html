<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="VoxelWorld — A Minecraft-like voxel world generator with procedural terrain, day/night cycle, and wildlife." />
  <title>VoxelWorld Generator</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="hud">
    <div id="crosshair">+</div>
    <div id="controls-help">
      <div class="controls-title">Controls</div>
      <div>WASD — Move</div>
      <div>Mouse — Look</div>
      <div>LMB — Mine Block</div>
      <div>RMB — Place Block</div>
      <div>Scroll / 1-9 — Select</div>
      <div>Space — Jump</div>
      <div>Shift — Sprint</div>
      <div>Click to play</div>
    </div>
    <div id="hotbar-container"></div>
    <div id="debug-info"></div>
  </div>
  <div id="loading-screen">
    <div class="loader-container">
      <div class="loader-title">VoxelWorld</div>
      <div class="loader-subtitle">Generating terrain...</div>
      <div class="loader-bar-bg">
        <div class="loader-bar" id="loader-bar"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
